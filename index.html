<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corrector de Hoja de Ruta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 40px 36px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            color: #fff;
        }

        .logo {
            font-size: 42px;
            margin-bottom: 10px;
            text-align: center;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 6px;
            background: linear-gradient(90deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.55);
            margin-bottom: 28px;
        }

        .drop-zone {
            border: 2px dashed rgba(167, 139, 250, 0.5);
            border-radius: 14px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s;
            background: rgba(167, 139, 250, 0.05);
            margin-bottom: 16px;
            position: relative;
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: #a78bfa;
            background: rgba(167, 139, 250, 0.12);
        }

        .drop-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .drop-icon {
            font-size: 34px;
            margin-bottom: 8px;
        }

        .drop-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }

        .drop-sub {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 4px;
        }

        .file-list {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .file-item {
            background: rgba(167, 139, 250, 0.1);
            border: 1px solid rgba(167, 139, 250, 0.25);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 13px;
            color: #c4b5fd;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .file-item .status {
            margin-left: auto;
            font-size: 12px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #7c3aed, #2563eb);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: opacity 0.2s, transform 0.1s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: #a78bfa;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .msg {
            margin-top: 14px;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
        }

        .msg.ok {
            background: rgba(52, 211, 153, 0.12);
            border: 1px solid rgba(52, 211, 153, 0.3);
            color: #6ee7b7;
        }

        .msg.err {
            background: rgba(248, 113, 113, 0.12);
            border: 1px solid rgba(248, 113, 113, 0.3);
            color: #fca5a5;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">🚚</div>
        <h1>Corrector de Hoja de Ruta</h1>
        <p class="subtitle">Sube uno o varios Excel con formato incorrecto y se descargarán corregidos.</p>

        <div class="drop-zone" id="dropZone">
            <input type="file" id="fileInput" accept=".xls,.xlsx" multiple onchange="mostrarArchivos()">
            <div class="drop-icon">📂</div>
            <div class="drop-text">Arrastra archivos aquí o haz clic</div>
            <div class="drop-sub">Formatos: .xls y .xlsx — puedes seleccionar varios a la vez</div>
        </div>

        <div class="file-list" id="fileList"></div>
        <button id="btn" onclick="procesarTodos()">⚡ Corregir y Descargar</button>
        <div class="loader" id="loader"><span class="spinner"></span> Procesando archivos…</div>
        <div id="msg"></div>
    </div>

    <script>
        // La URL apunta al mismo servidor que sirve este HTML (funciona tanto local como en Vercel)
        const API = window.location.origin + '/corregir-hr';

        const dropZone = document.getElementById('dropZone');
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            document.getElementById('fileInput').files = e.dataTransfer.files;
            mostrarArchivos();
        });

        function mostrarArchivos() {
            const files = Array.from(document.getElementById('fileInput').files);
            const list = document.getElementById('fileList');
            list.innerHTML = '';
            files.forEach(f => {
                const div = document.createElement('div');
                div.className = 'file-item';
                div.id = 'item-' + f.name;
                div.innerHTML = `<span>📄 ${f.name}</span><span class="status" id="st-${f.name}">⏳ Pendiente</span>`;
                list.appendChild(div);
            });
        }

        async function procesarTodos() {
            const files = Array.from(document.getElementById('fileInput').files);
            if (!files.length) { showMsg('Por favor selecciona al menos un archivo Excel.', 'err'); return; }

            document.getElementById('loader').style.display = 'block';
            document.getElementById('btn').disabled = true;
            document.getElementById('msg').innerHTML = '';

            let ok = 0, fail = 0;

            for (const file of files) {
                const st = document.getElementById('st-' + file.name);
                if (st) st.textContent = '⏳ Procesando…';
                try {
                    const formData = new FormData();
                    formData.append('data', file);
                    const response = await fetch(API, { method: 'POST', body: formData });

                    if (!response.ok) {
                        let msg = 'Error';
                        try { const j = await response.json(); msg = j.mensaje || msg; } catch (_) { }
                        throw new Error(msg);
                    }

                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    let filename = file.name.replace(/\.xlsx?$/i, '_CORREGIDO.xlsx');
                    const disp = response.headers.get('Content-Disposition');
                    if (disp && disp.includes('filename=')) filename = disp.split('filename=')[1].replace(/^["']|["']$/g, '');
                    a.href = url; a.download = filename;
                    document.body.appendChild(a); a.click(); a.remove();
                    URL.revokeObjectURL(url);
                    if (st) st.textContent = '✅ Descargado';
                    ok++;
                } catch (e) {
                    if (st) st.textContent = '❌ Error';
                    fail++;
                }
            }

            document.getElementById('loader').style.display = 'none';
            document.getElementById('btn').disabled = false;
            if (fail === 0) showMsg(`✅ ${ok} archivo(s) procesado(s) correctamente.`, 'ok');
            else showMsg(`⚠️ ${ok} procesado(s), ${fail} con error.`, 'err');
        }

        function showMsg(html, type) {
            const el = document.getElementById('msg');
            el.innerHTML = html;
            el.className = 'msg ' + type;
        }
    </script>
</body>

</html>
